{% extends "base.html" %}

{% block title %}{{ page.title }} - {{ SITENAME }}{% endblock title %}

{% block content %}
<article class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <header class="mb-10 pb-8 border-b border-slate-200 dark:border-slate-800">
        <h1 class="text-3xl md:text-4xl font-bold text-slate-900 dark:text-white">{{ page.title }}</h1>
    </header>
    
    <div class="prose prose-slate dark:prose-invert prose-a:text-venturi-cyan hover:prose-a:text-cyan-600 dark:hover:prose-a:text-cyan-400 prose-code:font-mono prose-pre:bg-slate-900 dark:prose-pre:bg-slate-950 max-w-none">
        {{ page.content }}
    </div>
</article>
{% endblock content %}
