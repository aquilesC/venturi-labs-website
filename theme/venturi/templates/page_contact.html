{% extends "base.html" %}

{% block content %}
<section class="py-24 bg-slate-50 dark:bg-slate-900/50 min-h-[calc(100vh-4rem)] flex items-center justify-center">
    <div class="w-full max-w-3xl px-4 sm:px-6 lg:px-8">
        
        <div class="mb-10 text-center">
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-slate-900 dark:text-white mb-4">Initialize Connection</h1>
            <p class="text-slate-600 dark:text-slate-400 font-mono text-sm">Secure transmission channel to Venturi Labs Engineering.</p>
        </div>

        <!-- Dashboard Card (Brutalist / Linear) -->
        <div class="bg-white dark:bg-[#0f172a] border-2 border-slate-900 dark:border-slate-700 p-8 md:p-10 shadow-[8px_8px_0px_0px_rgba(15,23,42,1)] dark:shadow-[8px_8px_0px_0px_rgba(6,182,212,0.3)]">
            
            <!-- Formspree status messages -->
            <div data-fs-success class="hidden mb-6 p-4 bg-emerald-100/50 dark:bg-emerald-900/30 border border-emerald-500 text-emerald-800 dark:text-emerald-400 font-mono text-sm rounded">
                Transmission successful. Venturi Engineering will contact you shortly.
            </div>
            <div data-fs-error class="hidden mb-6 p-4 bg-red-100/50 dark:bg-red-900/30 border border-red-500 text-red-800 dark:text-red-400 font-mono text-sm rounded">
                Transmission failed. Please verify your inputs.
            </div>

            <form id="contact-form" class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="name" class="block text-sm font-bold text-slate-900 dark:text-slate-300 mb-2 uppercase tracking-wide">Name / Callsign</label>
                        <input type="text" id="name" name="name" data-fs-field class="w-full bg-transparent border border-slate-300 dark:border-slate-600 rounded-none px-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:ring-0 focus:border-venturi-cyan dark:focus:border-venturi-cyan transition-colors aria-[invalid=true]:border-red-500 aria-[invalid=true]:focus:border-red-500" required>
                        <span data-fs-error="name" class="text-red-500 text-xs font-mono mt-1 block"></span>
                    </div>
                    
                    <div>
                        <label for="email" class="block text-sm font-bold text-slate-900 dark:text-slate-300 mb-2 uppercase tracking-wide">Email</label>
                        <input type="email" id="email" name="email" data-fs-field class="w-full bg-transparent border border-slate-300 dark:border-slate-600 rounded-none px-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:ring-0 focus:border-venturi-cyan dark:focus:border-venturi-cyan transition-colors aria-[invalid=true]:border-red-500 aria-[invalid=true]:focus:border-red-500" required>
                        <span data-fs-error="email" class="text-red-500 text-xs font-mono mt-1 block"></span>
                    </div>
                </div>

                <div>
                    <label for="institution" class="block text-sm font-bold text-slate-900 dark:text-slate-300 mb-2 uppercase tracking-wide">Institution / Lab</label>
                    <input type="text" id="institution" name="institution" data-fs-field class="w-full bg-transparent border border-slate-300 dark:border-slate-600 rounded-none px-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:ring-0 focus:border-venturi-cyan dark:focus:border-venturi-cyan transition-colors aria-[invalid=true]:border-red-500 aria-[invalid=true]:focus:border-red-500" required>
                    <span data-fs-error="institution" class="text-red-500 text-xs font-mono mt-1 block"></span>
                </div>

                <div>
                    <label for="inquiry_type" class="block text-sm font-bold text-slate-900 dark:text-slate-300 mb-2 uppercase tracking-wide">Inquiry Classification</label>
                    <div class="relative">
                        <select id="inquiry_type" name="inquiry_type" data-fs-field class="w-full bg-transparent border border-slate-300 dark:border-slate-600 rounded-none px-4 py-3 text-slate-900 dark:text-white appearance-none focus:outline-none focus:ring-0 focus:border-venturi-cyan dark:focus:border-venturi-cyan transition-colors aria-[invalid=true]:border-red-500 aria-[invalid=true]:focus:border-red-500" required>
                            <option value="" class="dark:bg-slate-800">Select Classification...</option>
                            <option value="tto" class="dark:bg-slate-800">TTO Partnership</option>
                            <option value="pi" class="dark:bg-slate-800">PI Grant Collaboration</option>
                            <option value="investment" class="dark:bg-slate-800">Investment</option>
                            <option value="general" class="dark:bg-slate-800">General Inquiry</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                    <span data-fs-error="inquiry_type" class="text-red-500 text-xs font-mono mt-1 block"></span>
                </div>

                <div>
                    <label for="message" class="block text-sm font-bold text-slate-900 dark:text-slate-300 mb-2 uppercase tracking-wide">Transmission Payload</label>
                    <textarea id="message" name="message" rows="5" data-fs-field class="w-full bg-transparent border border-slate-300 dark:border-slate-600 rounded-none px-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:ring-0 focus:border-venturi-cyan dark:focus:border-venturi-cyan transition-colors resize-y aria-[invalid=true]:border-red-500 aria-[invalid=true]:focus:border-red-500" required></textarea>
                    <span data-fs-error="message" class="text-red-500 text-xs font-mono mt-1 block"></span>
                </div>

                <div class="pt-4">
                    <button type="submit" data-fs-submit-btn class="w-full bg-venturi-cyan hover:bg-cyan-600 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold uppercase tracking-wider py-4 px-6 border-2 border-transparent focus:outline-none focus:border-white transition-colors">
                        Transmit Data
                    </button>
                </div>
            </form>

            <script>
              window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
              formspree('initForm', { formElement: '#contact-form', formId: 'meedopvy' });
            </script>
            <script src="https://unpkg.com/@formspree/ajax@1" defer></script>
            
        </div>
    </div>
</section>
{% endblock content %}
